name: Integration Tests (Real Project)

on:
  workflow_dispatch:
  schedule:
    # Weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  push:
    branches: [main]

jobs:
  integration-real:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'InsForge' }}
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build

      - name: Validate required integration secrets
        env:
          INSFORGE_ACCESS_TOKEN: ${{ secrets.INSFORGE_ACCESS_TOKEN }}
          INSFORGE_API_KEY: ${{ secrets.INSFORGE_API_KEY }}
          INSFORGE_OSS_HOST: ${{ secrets.INSFORGE_OSS_HOST }}
          INSFORGE_PROJECT_ID: ${{ secrets.INSFORGE_PROJECT_ID }}
          INSFORGE_ORG_ID: ${{ secrets.INSFORGE_ORG_ID }}
        run: |
          set -euo pipefail
          missing=0
          for v in INSFORGE_ACCESS_TOKEN INSFORGE_API_KEY INSFORGE_OSS_HOST INSFORGE_PROJECT_ID INSFORGE_ORG_ID; do
            if [ -z "${!v:-}" ]; then
              echo "::error title=Missing required secret::Secret $v is not configured"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare credentials and project config
        env:
          INSFORGE_ACCESS_TOKEN: ${{ secrets.INSFORGE_ACCESS_TOKEN }}
          INSFORGE_API_KEY: ${{ secrets.INSFORGE_API_KEY }}
          INSFORGE_OSS_HOST: ${{ secrets.INSFORGE_OSS_HOST }}
          INSFORGE_PROJECT_ID: ${{ secrets.INSFORGE_PROJECT_ID }}
          INSFORGE_ORG_ID: ${{ secrets.INSFORGE_ORG_ID }}
        run: |
          mkdir -p "$HOME/.insforge"
          cat > "$HOME/.insforge/credentials.json" <<EOF
          {
            "access_token": "${INSFORGE_ACCESS_TOKEN}",
            "refresh_token": "",
            "user": {
              "id": "integration-user",
              "name": "Integration User",
              "email": "integration@example.com",
              "avatar_url": null,
              "email_verified": true
            }
          }
          EOF

          mkdir -p .insforge
          cat > .insforge/project.json <<EOF
          {
            "project_id": "${INSFORGE_PROJECT_ID}",
            "project_name": "integration-project",
            "org_id": "${INSFORGE_ORG_ID}",
            "appkey": "integration-appkey",
            "region": "integration-region",
            "api_key": "${INSFORGE_API_KEY}",
            "oss_host": "${INSFORGE_OSS_HOST}"
          }
          EOF

      - name: Run real-project integration tests
        run: npm run test:integration:real
        env:
          INTEGRATION_TEST_ENABLED: 'true'
          INSFORGE_API_URL: ${{ secrets.INSFORGE_API_URL }}
          INTEGRATION_LOG_SOURCE: ${{ secrets.INSFORGE_LOG_SOURCE }}
